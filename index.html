<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
        <h1>Recipe Finder</h1>
        </header>
        <main>
        <div class="search-box">
            <label for="search-input">Search for a recipe:</label>
            <input type="text" id="search-input" placeholder="Search for a meal (e.g., Chicken)">
            <button id="search-btn">Search</button>
        </div>
        <div id="loading-spinner" class="spinner" style="display: none;"></div>

        <div id="recipe-container" class="recipe-grid">
            <!-- Recipes will be injected here by JavaScript -->
        </div>
        </main>
    </div>
    <!-- The Modal Container -->
    <div id="recipe-modal" class="modal-overlay ">
        <div class="modal-content">
        <button id="close-modal" class="close-btn">&times;</button>
        <div id="modal-body">
        <!-- Recipe details will be injected here -->
        </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
